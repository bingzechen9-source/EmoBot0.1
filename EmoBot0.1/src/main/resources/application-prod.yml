# 生产环境：通义 Chat + 通义 Embedding + PostgreSQL RAG
# 启动时指定: --spring.profiles.active=prod
# 环境变量: DASHSCOPE_API_KEY, SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

spring:
  autoconfigure:
    exclude: []  # 生产需要 DataSource，取消默认排除
  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/emobot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

emobot:
  rag:
    enabled: true
    top-k: 6
    similarity-threshold: 0.65
